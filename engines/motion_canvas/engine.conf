# MaCode Engine Self-Description: Motion Canvas
# This file allows pipeline/render.sh to discover the engine dynamically.
#
# NOTE: cli_signature and output_pattern are reserved for future upgrades.
# Currently, engines/motion_canvas/scripts/ serve the Harness 2.0 execution layer.
# When upgrading Motion Canvas, these fields serve as the migration checklist.

name: motion_canvas
mode: batch
version_cmd: "node -e 'console.log(require(\"@motion-canvas/core/package.json\").version)'"

compatibility:
  adapter_version: "1.0.0"
  engine_semver: ">=3.16.0, <3.19.0"

cli_signature:
  render_frames:
    executable: "node engines/motion_canvas/scripts/playwright-render.mjs"
    args:
      - "{capture_url}"
      - "{output_dir}"
      - "{fps}"
      - "{duration}"
      - "{width}"
      - "{height}"

output_pattern:
  frames_dir: "{output_dir}"
  frame_glob: "frame_*.png"

scene_extensions:
  - .tsx

# Harness 2.0 execution layer scripts
render_script: engines/motion_canvas/scripts/playwright-render.mjs
dev_script: engines/motion_canvas/scripts/dev.sh
service_script: engines/motion_canvas/scripts/serve.mjs
service_port_min: 4567
service_port_max: 5999

inspect_script: engines/motion_canvas/scripts/inspect.sh
validate_script: engines/motion_canvas/scripts/validate_sourcemap.sh
sourcemap: engines/motion_canvas/SOURCEMAP.md
