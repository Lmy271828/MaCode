# MaCode Engine Self-Description: ManimGL
# This file allows pipeline/render.sh to discover the engine dynamically.

name: manimgl
mode: interactive
version_cmd: ".venv-manimgl/bin/python -c 'import manimlib; print(manimlib.__version__)'"
python_path: ".venv-manimgl/bin/python"

compatibility:
  adapter_version: "1.0.0"
  engine_semver: ">=1.6.0, <2.0.0"

scene_extensions:
  - .py
render_script: engines/manimgl/scripts/render.sh
dev_script: engines/manimgl/scripts/dev.sh
inspect_script: engines/manimgl/scripts/inspect.sh
validate_script: engines/manimgl/scripts/validate_sourcemap.sh
sourcemap: engines/manimgl/SOURCEMAP.md
