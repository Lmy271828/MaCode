# MaCode Engine Self-Description: ManimCE
# This file allows pipeline/render.sh to discover the engine dynamically.
#
# NOTE: cli_signature and output_pattern are reserved for future upgrades.
# Currently, engines/manim/scripts/render.sh uses hardcoded CLI args.
# When upgrading ManimCE, these fields serve as the migration checklist.

name: manim
mode: batch
version_cmd: ".venv/bin/python -c 'import manim; print(manim.__version__)'"

compatibility:
  adapter_version: "1.0.0"
  engine_semver: ">=0.18.0, <0.22.0"

cli_signature:
  render_frames:
    executable: "{python} -m manim"
    args:
      - "--format=png"
      - "--fps={fps}"
      - "--media_dir={output_dir}/.media"
      - "{scene_file}"

output_pattern:
  frames_dir: "{output_dir}/.media/images/{scene_name}/*"
  frame_glob: "*.png"

scene_extensions:
  - .py
render_script: engines/manim/scripts/render.sh
inspect_script: engines/manim/scripts/inspect.sh
validate_script: engines/manim/scripts/validate_sourcemap.sh
sourcemap: engines/manim/SOURCEMAP.md
