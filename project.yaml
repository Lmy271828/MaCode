# MaCode 全局配置
# 引擎无关的场景契约层 + 安全策略

project:
  name: MaCode
  version: "0.8.0"

# 默认渲染设置
defaults:
  engine: manimgl
  resolution: [1920, 1080]
  fps: 30

# 引擎选择说明：
# - manimgl:       ManimGL, 实时交互预览, 适合数学/3D 开发迭代 (默认 .py)
# - motion_canvas: Motion Canvas, 浏览器 WebGL 热重载, 适合数据可视化/Shader (.tsx)
# - manim:         ManimCE, 批处理渲染, 仅用于 CI/最终输出

# Agent 安全策略
agent:
  context_bootstrap:
    - "engines/${default_engine}/SOURCEMAP.md"
  prompt_injection:
    whitelist_max: 10
    blacklist_enforcement: true
    extension_visibility: false

  allowed_commands:
    - manim
    - ffmpeg
    - ffprobe
    - jq
    - yq
    - git
    - find
    - grep
    - sed
    - awk
    - just
    - du
    - df
    - cat
    - ls
    - cp
    - mv
    - rm
    - mkdir
    - touch
    - echo
    - tee
    - tail
    - head
    - wc
    - sort
    - uniq
    - xargs
    - chmod
    - dirname
    - basename
    - pwd
    - date
    - printf

  blocked_patterns:
    - "rm -rf /"
    - "rm -rf ~"
    - "curl|wget"
    - "eval|exec|bash -c"
    - "pip install|pip3 install"
    - "npm install|npm i "
    - "sudo|su -"
    - "> /dev/sda"
    - "dd if="
    - "cat .macode|cat .claude|cat .git/config"
    - "\.macode/|\.claude/|\.git/config"
    - "git push --force|git push -f|git push --delete"
    - "git reset --hard"
    - "git clean -f"
    - "subprocess\.|os\.system\(|os\.popen\(|socket\.|requests\.|urllib\."
    - "shutil\.rmtree|shutil\.move|__import__\("

  resource_limits:
    max_frames_per_scene: 10000
    max_disk_gb: 50
    max_render_time_sec: 600
    max_concurrent_scenes: 4

# 日志配置
logging:
  level: info
  directory: .agent/log
  format: "text"
